  <rect x="32" y="38" width="4" height="14" rx="2" fill="#ffffff"/>
  <rect x="36" y="38" width="4" height="14" rx="2" fill="#ffffff"/>
  <rect x="40" y="38" width="4" height="14" rx="2" fill="#ffffff"/>

  <!-- Spoon (right) -->
  <ellipse cx="78" cy="44" rx="6" ry="8" fill="#ffffff"/>
  <rect x="76" y="52" width="4" height="30" rx="2" fill="#ffffff"/>
